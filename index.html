<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>115學年度 學員報到總覽</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&display=swap');
:root{--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--text2:#555770;--text3:#8b8da3;--accent:#2563eb;--accent-light:#dbeafe;--accent-dark:#1d4ed8;--border:#e2e5ea;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);--shadow-lg:0 4px 16px rgba(0,0,0,.08),0 12px 40px rgba(0,0,0,.06);--radius:14px;--radius-sm:8px;--green:#059669;--green-bg:#ecfdf5}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 60%,#3b82f6 100%);padding:26px 32px 22px;color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(37,99,235,.25);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-left h1{font-size:21px;font-weight:700;letter-spacing:.5px}
.header-left .sub{font-size:13px;opacity:.75;font-weight:300;margin-top:2px}
.header-actions{display:flex;gap:8px}
.header-actions button{padding:7px 16px;border:1.5px solid rgba(255,255,255,.5);border-radius:var(--radius-sm);background:rgba(255,255,255,.12);color:#fff;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.header-actions button:hover{background:rgba(255,255,255,.25);border-color:#fff}
.controls{display:flex;gap:10px;align-items:center;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:78px;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.filter-group{display:flex;align-items:center;gap:6px}
.controls label{font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap}
.controls select,.controls input[type=text]{padding:7px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border-color .2s}
.controls select:focus,.controls input:focus{border-color:var(--accent)}
.controls select{cursor:pointer;min-width:200px}
.controls input[type=text]{min-width:150px}
.view-toggle{display:flex;background:#e8ebf0;border-radius:var(--radius-sm);overflow:hidden;margin-left:auto}
.view-toggle button{padding:7px 16px;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s}
.view-toggle button.active{background:var(--accent);color:#fff}
.main{padding:20px 24px 40px;max-width:1440px;margin:0 auto}
.summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:22px}
.summary-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);text-align:center}
.summary-card .num{font-size:30px;font-weight:900;color:var(--accent);line-height:1.1}
.summary-card .label{font-size:11.5px;color:var(--text3);font-weight:500;margin-top:3px}
.week-title{font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.week-title .badge{background:var(--accent);color:#fff;font-size:13px;font-weight:600;padding:3px 12px;border-radius:20px}
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:14px;margin-bottom:32px}
.dept-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:transform .15s,box-shadow .15s}
.dept-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.dept-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;border-bottom:1px solid var(--border)}
.dept-name{font-size:16px;font-weight:700}
.dept-count{background:var(--accent-light);color:var(--accent-dark);font-size:13px;font-weight:700;padding:2px 10px;border-radius:12px}
.stu-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:auto}
.stu-table-wrap{overflow-x:auto}
.stu-table th{text-align:left;padding:7px 10px;font-weight:600;color:var(--text3);background:#f8f9fb;font-size:11.5px;border-bottom:1px solid var(--border)}
.stu-table td{padding:7px 10px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.stu-table tr:last-child td{border-bottom:none}
.stu-table tr:hover td{background:#f8faff}
.stu-name{font-weight:600;white-space:nowrap}
.stu-code{color:var(--accent-dark);font-weight:600;font-family:'Menlo','Consolas',monospace;font-size:12.5px}
.hr-input{width:88px;padding:4px 7px;border:1.5px dashed #cbd5e1;border-radius:6px;font-family:'Menlo','Consolas',monospace;font-size:12.5px;color:var(--text);background:#fafbfc;outline:none;transition:all .2s}
.hr-input:focus{border-color:var(--accent);border-style:solid;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.hr-input.filled{border-color:var(--green);border-style:solid;background:var(--green-bg);color:var(--green)}
.grade-tag{font-size:11px;color:#fff;font-weight:500;padding:1px 8px;border-radius:10px;white-space:nowrap;display:inline-block}
.grade-six{background:#6366f1}.grade-four{background:#f59e0b}.grade-three{background:#10b981}.grade-other{background:#94a3b8}
.time-tag{display:inline-block;font-size:11px;color:var(--accent-dark);background:var(--accent-light);padding:2px 8px;border-radius:6px;margin:1px 2px;white-space:nowrap;font-weight:500}
.time-cell{line-height:1.7}
.table-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow-x:auto;margin-bottom:32px}
.table-wrap table{width:100%;border-collapse:collapse;font-size:13px}
.table-wrap th{background:#f8f9fb;padding:9px 12px;text-align:left;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:2}
.table-wrap td{padding:8px 12px;border-bottom:1px solid #f3f4f6;white-space:nowrap}
.table-wrap tr:hover td{background:#f8faff}
.count-cell{font-weight:700;color:var(--accent);text-align:center;cursor:default}
.count-zero{color:#d1d5db;font-weight:400}
.total-row td{font-weight:700!important;background:#f0f5ff!important;border-top:2px solid var(--accent)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.2);opacity:0;transform:translateY(12px);transition:all .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:28px 32px;max-width:560px;width:90%;box-shadow:var(--shadow-lg)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:6px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.modal input[type=text]{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Menlo','Consolas',monospace;outline:none;margin-bottom:16px;transition:border-color .2s}
.modal input[type=text]:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-actions button{padding:8px 20px;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:#e8ebf0;color:var(--text2)}
.btn-secondary:hover{background:#dde0e6}
.btn-settings{padding:7px 12px!important;border:1.5px solid rgba(255,255,255,.5)!important;border-radius:var(--radius-sm)!important;background:rgba(255,255,255,.08)!important;color:#fff!important;font-size:16px!important;cursor:pointer;transition:all .2s;line-height:1}
.has-tip{position:relative}
.has-tip .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:8px 12px;border-radius:8px;font-size:12px;white-space:pre-line;z-index:50;min-width:140px;box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:none;text-align:left;font-weight:400}
.has-tip:hover .tip{display:block}
@media(max-width:768px){.header{padding:18px 16px}.header-left h1{font-size:17px}.controls{padding:10px 14px;gap:6px;top:66px}.main{padding:14px 10px}.dept-grid{grid-template-columns:1fr}.summary-bar{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

</div>

  <div class="filter-group" id="filterUnfilledGroup" style="display:none">

      <option value="all">全部</option>
    </select>
  </div>
  <div class="view-toggle">
    <button id="btnCard" class="active">卡片檢視</button>
    <button id="btnTable">總表檢視</button>
  </div>
</div>
<div class="main" id="main"></div>
<div class="toast" id="toast"></div>

  try { var saved = localStorage.getItem(URL_KEY); if(saved) APPS_SCRIPT_URL = saved; } catch(e){}

  // Settings modal
  document.getElementById('btnSettings').addEventListener('click', function(){
    document.getElementById('inputUrl').value = APPS_SCRIPT_URL;
    document.getElementById('modalOverlay').className = 'modal-overlay show';
  });
  document.getElementById('btnModalCancel').addEventListener('click', function(){
    document.getElementById('modalOverlay').className = 'modal-overlay';

  function checkUrl(){
    if(!APPS_SCRIPT_URL){
      // Open settings modal instead of alert
      document.getElementById('inputUrl').value = '';
      document.getElementById('modalOverlay').className = 'modal-overlay show';
      return false;
    }
    return true;

  // ====== 同步人事號到 Google Sheets ======
  // 使用隱藏 iframe + form 提交，繞過跨域限制
  function syncToSheet(){
    if(!checkUrl()) return;

    var payload = [];
    S.forEach(function(st){
      if(st.h && st.h.trim()){
        payload.push({
          name: st.n,
          school: st.s,
          grade: displayGrade(st.g),
          code: st.c,
          hrId: st.h,
          row: st.r
        });
      }
    });

    if(payload.length === 0){
      toast('\u6c92\u6709\u4efb\u4f55\u5df2\u586b\u5beb\u7684\u4eba\u4e8b\u865f\u53ef\u540c\u6b65');
      return;
    }

    var btn = document.getElementById('btnSync');
    var origHtml = btn.innerHTML;
    btn.textContent = '\u2026 \u540c\u6b65\u4e2d (' + payload.length + ' \u7b46)';
    btn.disabled = true;

    // 建立隱藏 iframe 接收回應
    var iframeName = 'syncFrame' + Date.now();
    var iframe = document.createElement('iframe');
    iframe.name = iframeName;
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    // 建立表單提交 POST
    var form = document.createElement('form');
    form.method = 'POST';
    form.action = APPS_SCRIPT_URL;
    form.target = iframeName;
    form.style.display = 'none';

    var input = document.createElement('textarea');
    input.name = 'postData';
    input.value = JSON.stringify({ action: 'sync', data: payload });
    form.appendChild(input);

    document.body.appendChild(form);
    form.submit();

    // 等待處理完成後用 JSONP 驗證
    setTimeout(function(){
      form.remove();
      iframe.remove();
      // 用 JSONP 確認結果
      jsonpCall('fetch', function(json){
        if(json && json.status === 'ok' && json.data && json.data.length > 0){
          toast('\u540c\u6b65\u6210\u529f\uff01\u5df2\u5beb\u5165 ' + payload.length + ' \u7b46\u4eba\u4e8b\u865f\u5230 D \u6b04');
        } else {
          toast('\u5df2\u9001\u51fa ' + payload.length + ' \u7b46\uff0c\u8acb\u5230 Sheets \u78ba\u8a8d D \u6b04');
        }
        btn.innerHTML = origHtml;
        btn.disabled = false;
      }, function(){
        toast('\u5df2\u9001\u51fa ' + payload.length + ' \u7b46\uff0c\u8acb\u5230 Sheets \u78ba\u8a8d D \u6b04');
        btn.innerHTML = origHtml;
        btn.disabled = false;
      });
    }, 4000);
  }

  // ====== JSONP 通用呼叫 ======
  function jsonpCall(action, onSuccess, onError){
    var cbName = '__cb' + Date.now() + Math.random().toString(36).slice(2,6);
    var timeoutId;

    window[cbName] = function(json){
      clearTimeout(timeoutId);
      delete window[cbName];
      var s = document.getElementById(cbName);
      if(s) s.remove();
      if(onSuccess) onSuccess(json);
    };

    timeoutId = setTimeout(function(){
      delete window[cbName];
      var s = document.getElementById(cbName);
      if(s) s.remove();
      if(onError) onError();
    }, 15000);

    var script = document.createElement('script');
    script.id = cbName;
    script.src = APPS_SCRIPT_URL + '?action=' + action + '&callback=' + cbName;
    script.onerror = function(){
      clearTimeout(timeoutId);
      delete window[cbName];
      this.remove();
      if(onError) onError();
    };
    document.body.appendChild(script);
  }

  // ====== 從 Google Sheets 讀取人事號 ======
  function fetchFromSheet(){
    if(!checkUrl()) return;

    var btn = document.getElementById('btnFetchSheet');
    var origHtml = btn.innerHTML;
    btn.textContent = '\u2026 \u8b80\u53d6\u4e2d';
    btn.disabled = true;

    jsonpCall('fetch', function(json){
      if(json.status === 'ok' && json.data && json.data.length > 0){
        var count = 0;
        json.data.forEach(function(item){
          var si = S.findIndex(function(s){ return s.r === item.row && s.c === item.code; });
          if(si >= 0 && item.hrId){
            saveHr(si, item.hrId);
            count++;
          }
        });
        render();
        toast('\u5df2\u5f9e Google Sheets \u8b80\u53d6 ' + count + ' \u7b46\u4eba\u4e8b\u865f');
      } else if(json.status === 'error'){
        toast('\u932f\u8aa4\uff1a' + json.message);
      } else {
        toast('Sheets \u4e0a\u5c1a\u7121\u4eba\u4e8b\u865f\u8cc7\u6599');
      }
      btn.innerHTML = origHtml;
      btn.disabled = false;
    }, function(){
      toast('\u8b80\u53d6\u903e\u6642\uff0c\u8acb\u78ba\u8a8d Apps Script \u5df2\u91cd\u65b0\u90e8\u7f72\u70ba\u65b0\u7248\u672c');
      btn.innerHTML = origHtml;
      btn.disabled = false;
    });
  }

  function gc(g){
    if(g.indexOf('\u516d')>=0) return 'grade-six';
    if(g.indexOf('\u56db')>=0) return 'grade-four';
    if(g.indexOf('\u4e09')>=0) return 'grade-three';
    return 'grade-other';
  }

  function displayGrade(g){
    if(g === '\u4e09\u5e74\u7d1a') return '\u5f8c\u91ab\u4e09';
    if(g === '\u56db\u5e74\u7d1a') return '\u5f8c\u91ab\u56db';
    return g;
  }

  function matchSearch(si){
    if(!search) return true;
    var st = S[si];
    return st.n.toLowerCase().indexOf(search)>=0 || st.s.toLowerCase().indexOf(search)>=0 || st.c.toLowerCase().indexOf(search)>=0 || st.h.toLowerCase().indexOf(search)>=0;
  }

  function saveHr(studentIdx, value){
    S[studentIdx].h = value;
    hrStore[studentIdx] = value;
    try { localStorage.setItem(HR_KEY, JSON.stringify(hrStore)); } catch(e){}
  }

  // Get weeks a student spends in a specific dept, sorted by time
  // Returns array of week indices
  function getStudentDeptWeekIdxs(si, dept){
    var entries = [];
    S[si].sc.forEach(function(entry){
      if(entry[1] === dept) entries.push(entry[0]);
    });
    entries.sort(function(a,b){ return a-b; });
    return entries;
  }

  // Get a student's FULL internship period (across ALL depts)
  // Returns array of ALL week indices
  function getStudentAllWeekIdxs(si){
    var entries = [];
    S[si].sc.forEach(function(entry){
      entries.push(entry[0]);
    });
    entries.sort(function(a,b){ return a-b; });
    return entries;
  }

  // Get a student's compact period string: e.g. "115/5/4-5/29"
  // = first week start date + last week end date
  function getStudentPeriod(si){
    var idxs = getStudentAllWeekIdxs(si);
    if(idxs.length === 0) return '';
    var first = WL[idxs[0]];          // e.g. "115/5/4-5/8"
    var last  = WL[idxs[idxs.length-1]]; // e.g. "115/5/25-5/29"
    var startDate = first.split('-')[0]; // "115/5/4"
    var endDate   = last.split('-').pop(); // "5/29"
    if(first === last) return first;
    return startDate + '-' + endDate;
  }

  // Compress consecutive week indices into readable range strings
  // e.g. [0,1,2,3] -> ["115/5/4-5/8 ~ 115/5/25-5/29"]
  // e.g. [0,1,5,6] -> ["115/5/4-5/8 ~ 115/5/11-5/15", "115/6/8-6/12 ~ 115/6/15-6/19"]
  function compressToRanges(weekIdxs){
    if(weekIdxs.length === 0) return [];
    var ranges = [];
    var start = weekIdxs[0], end = weekIdxs[0];
    for(var i = 1; i < weekIdxs.length; i++){
      if(weekIdxs[i] === end + 1){
        end = weekIdxs[i];
      } else {
        ranges.push([start, end]);
        start = weekIdxs[i];
        end = weekIdxs[i];
      }
    }
    ranges.push([start, end]);

    return ranges.map(function(r){
      if(r[0] === r[1]) return WL[r[0]];
      return WL[r[0]] + ' ~ ' + WL[r[1]];
    });
  }

  function getAllWeeksMerged(){
    var merged = {};
    W.forEach(function(w){
      var depts = w[1];
      Object.keys(depts).forEach(function(dk){
        if(!merged[dk]) merged[dk] = {};
        depts[dk].forEach(function(si){ merged[dk][si] = true; });
      });
    });
    var result = {};
    Object.keys(merged).forEach(function(dk){
      result[dk] = Object.keys(merged[dk]).map(Number);
    });
    return result;
  }

  function renderCard(el){
    if(IS_ADMIN) return renderAdmin(el);
    return renderViewer(el);
  }

  // ====== 人資部管理模式渲染 ======
  function renderAdmin(el){
    // Collect all students with their periods
    var students = [];
    var seen = {};
    
    if(wIdx === -1){
      // All time: show all students
      S.forEach(function(st, si){
        students.push(si);
      });
    } else {
      // Specific week: show students active in that week (across all depts)
      var w = W[wIdx];
      var depts = w[1];
      Object.keys(depts).forEach(function(dk){
        depts[dk].forEach(function(si){
          if(!seen[si]){ seen[si] = true; students.push(si); }
        });
      });
    }

    // Apply search filter
    students = students.filter(matchSearch);

    // Apply status filter
    if(statusFilter === 'unfilled'){
      students = students.filter(function(si){ return !S[si].h || !S[si].h.trim(); });
    } else if(statusFilter === 'filled'){
      students = students.filter(function(si){ return S[si].h && S[si].h.trim(); });
    }

    // Sort by start week
    students.sort(function(a, b){
      var aIdxs = getStudentAllWeekIdxs(a);
      var bIdxs = getStudentAllWeekIdxs(b);
      var aMin = aIdxs.length ? aIdxs[0] : 9999;
      var bMin = bIdxs.length ? bIdxs[0] : 9999;
      return aMin - bMin;
    });

    var total = students.length;
    var filledCount = students.filter(function(si){ return S[si].h && S[si].h.trim(); }).length;
    var pendingCount = total - filledCount;

    // Summary
    var h = '<div class="summary-bar">';
    h += '<div class="summary-card"><div class="num">'+total+'</div><div class="label">'+(onlyUnfilled?'\u5f85\u586b\u5beb\u4eba\u6578':'\u7b26\u5408\u689d\u4ef6\u5b78\u54e1')+'</div></div>';
    if(!onlyUnfilled){
      h += '<div class="summary-card"><div class="num" style="color:var(--green)">'+filledCount+'</div><div class="label">\u5df2\u586b\u5beb</div></div>';
      h += '<div class="summary-card"><div class="num" style="color:#ef4444">'+pendingCount+'</div><div class="label">\u5f85\u586b\u5beb</div></div>';
    }
    // School breakdown
    var schMap = {};
    students.forEach(function(si){ schMap[S[si].s]=(schMap[S[si].s]||0)+1; });
    var topSch = Object.entries(schMap).sort(function(a,b){ return b[1]-a[1]; })[0];
    h += '<div class="summary-card"><div class="num" style="font-size:19px">'+(topSch?escHtml(topSch[0]):'-')+'</div><div class="label">\u6700\u591a\u5b78\u6821 ('+(topSch?topSch[1]:0)+'\u4eba)</div></div>';
    h += '</div>';

    var weekLabel = (wIdx===-1) ? '\u6240\u6709\u5b78\u54e1' : W[wIdx][0];
    h += '<div class="week-title">'+escHtml(weekLabel)+' <span class="badge">'+total+' \u4f4d\u5b78\u54e1</span></div>';

    if(!students.length){
      if(onlyUnfilled){
        h += '<div class="empty-state"><div class="icon">&#9989;</div><p>\u6240\u6709\u5b78\u54e1\u7684\u4eba\u4e8b\u865f\u5df2\u586b\u5beb\u5b8c\u6210\uff01</p></div>';
      } else {
        h += '<div class="empty-state"><div class="icon">&#128203;</div><p>\u7121\u7b26\u5408\u689d\u4ef6\u7684\u5b78\u54e1</p></div>';
      }
    } else {
      h += '<div class="dept-grid" style="grid-template-columns:1fr">';
      h += '<div class="dept-card"><div class="stu-table-wrap"><table class="stu-table">';
      h += '<thead><tr><th>\u59d3\u540d</th><th>\u5b78\u6821</th><th>\u7c21\u78bc</th><th>\u4eba\u4e8b\u865f</th><th>\u5e74\u7d1a</th><th>\u5be6\u7fd2\u671f\u9593</th></tr></thead><tbody>';
      students.forEach(function(si){
        var st = S[si];
        var filledCls = st.h ? ' filled' : '';
        var period = getStudentPeriod(si);
        h += '<tr>';
        h += '<td class="stu-name">'+escHtml(st.n)+'</td>';
        h += '<td>'+escHtml(st.s)+'</td>';
        h += '<td class="stu-code">'+escHtml(st.c)+'</td>';
        h += '<td><input class="hr-input'+filledCls+'" type="text" value="'+escHtml(st.h)+'" placeholder="\u5f85\u586b\u5beb" data-si="'+si+'"></td>';
        h += '<td><span class="grade-tag '+gc(st.g)+'">'+escHtml(displayGrade(st.g))+'</span></td>';
        h += '<td><span class="time-tag">'+escHtml(period)+'</span></td>';
        h += '</tr>';
      });
      h += '</tbody></table></div></div>';
      h += '</div>';
    }
    el.innerHTML = h;

    el.querySelectorAll('.hr-input').forEach(function(inp){
      inp.addEventListener('change', function(){
        var si = +this.getAttribute('data-si');
        saveHr(si, this.value);
        this.className = 'hr-input' + (this.value ? ' filled' : '');
        toast('\u5df2\u5132\u5b58 ' + S[si].n + ' \u7684\u4eba\u4e8b\u865f');
      });
    });
  }

  // ====== 科部查閱模式渲染 ======
  function renderViewer(el){
    var isAll = (wIdx === -1);
    var depts = isAll ? getAllWeeksMerged() : W[wIdx][1];
    var dks = Object.keys(depts).sort();
    if(deptF) dks = dks.filter(function(d){ return d===deptF; });

    // Should we show time column? Only when a specific dept is filtered
    var showTime = IS_ADMIN || !!deptF;

    var filtered = {};
    var total = 0;
    var pendingTotal = 0;
    dks.forEach(function(dk){
      var ids = depts[dk].filter(matchSearch);
      // In admin + onlyUnfilled mode: filter out students who already have HR ID
      if(IS_ADMIN && onlyUnfilled){
        ids = ids.filter(function(si){ return !S[si].h || !S[si].h.trim(); });
      }
      if(ids.length){ filtered[dk] = ids; total += ids.length; }
    });
    // Count pending (unfilled) separately for summary
    if(!IS_ADMIN || !onlyUnfilled){
      dks.forEach(function(dk){
        var ids = (depts[dk]||[]).filter(matchSearch);
        ids.forEach(function(si){ if(!S[si].h || !S[si].h.trim()) pendingTotal++; });
      });
    } else {
      pendingTotal = total;
    }

    var fks = Object.keys(filtered).sort();
    var maxD = '-', maxC = 0;
    fks.forEach(function(k){ if(filtered[k].length>maxC){ maxC=filtered[k].length; maxD=k; } });
    var schMap = {};
    fks.forEach(function(k){ filtered[k].forEach(function(i){ schMap[S[i].s]=(schMap[S[i].s]||0)+1; }); });
    var topSch = Object.entries(schMap).sort(function(a,b){ return b[1]-a[1]; })[0];

    var periodLabel = isAll ? '\u5168\u5b78\u5e74\u5831\u5230\u4eba\u6b21' : '\u672c\u9031\u5831\u5230\u4eba\u6578';
    var h = '<div class="summary-bar">';
    h += '<div class="summary-card"><div class="num">'+total+'</div><div class="label">'+(IS_ADMIN && onlyUnfilled ? '\u5f85\u586b\u5beb\u4eba\u6578' : periodLabel)+'</div></div>';
    h += '<div class="summary-card"><div class="num">'+fks.length+'</div><div class="label">\u6d89\u53ca\u79d1\u90e8\u6578</div></div>';
    h += '<div class="summary-card"><div class="num" style="font-size:22px">'+escHtml(maxD)+'</div><div class="label">\u6700\u591a\u4eba\u79d1\u90e8 ('+maxC+'\u4eba)</div></div>';
    h += '<div class="summary-card"><div class="num" style="font-size:19px">'+(topSch?escHtml(topSch[0]):'-')+'</div><div class="label">\u6700\u591a\u5b78\u6821 ('+(topSch?topSch[1]:0)+'\u4eba)</div></div>';
    h += '</div>';

    var weekLabel = isAll ? '\u6240\u6709\u6642\u9593\uff08\u5168\u5b78\u5e74\uff09' : W[wIdx][0];
    h += '<div class="week-title">'+escHtml(weekLabel)+' <span class="badge">'+total+' \u4f4d\u5b78\u54e1</span></div>';

    if(!fks.length){
      if(IS_ADMIN && onlyUnfilled){
        h += '<div class="empty-state"><div class="icon">&#9989;</div><p>\u672c\u9031\u6240\u6709\u5b78\u54e1\u7684\u4eba\u4e8b\u865f\u5df2\u586b\u5beb\u5b8c\u6210\uff01</p></div>';
      } else {
        h += '<div class="empty-state"><div class="icon">&#128203;</div><p>\u672c\u9031\u7121\u7b26\u5408\u689d\u4ef6\u7684\u5b78\u54e1\u5831\u5230</p></div>';
      }
    } else {
      h += '<div class="dept-grid" style="'+(showTime?'grid-template-columns:1fr':'')+'">';
      fks.forEach(function(dk){
        var ids = filtered[dk];
        // Sort students by their earliest overall week (chronological)
        if(showTime){
          ids = ids.slice().sort(function(a, b){
            var aIdxs = getStudentAllWeekIdxs(a);
            var bIdxs = getStudentAllWeekIdxs(b);
            var aMin = aIdxs.length ? aIdxs[0] : 9999;
            var bMin = bIdxs.length ? bIdxs[0] : 9999;
            return aMin - bMin;
          });
        }
        h += '<div class="dept-card"><div class="dept-card-header"><span class="dept-name">'+escHtml(dk)+'</span><span class="dept-count">'+ids.length+' \u4eba</span></div>';
        h += '<div class="stu-table-wrap"><table class="stu-table"><thead><tr><th>\u59d3\u540d</th><th>\u5b78\u6821</th><th>\u7c21\u78bc</th><th>\u4eba\u4e8b\u865f</th><th>\u5e74\u7d1a</th>';
        if(showTime) h += '<th>\u5be6\u7fd2\u671f\u9593</th>';
        h += '</tr></thead><tbody>';
        ids.forEach(function(si){
          var st = S[si];
          var filledCls = st.h ? ' filled' : '';
          h += '<tr>';
          h += '<td class="stu-name">'+escHtml(st.n)+'</td>';
          h += '<td>'+escHtml(st.s)+'</td>';
          h += '<td class="stu-code">'+escHtml(st.c)+'</td>';
          if(IS_ADMIN){
            h += '<td><input class="hr-input'+filledCls+'" type="text" value="'+escHtml(st.h)+'" placeholder="\u5f85\u586b\u5beb" data-si="'+si+'"></td>';
          } else {
            if(st.h){
              h += '<td><span class="stu-code" style="color:var(--green)">'+escHtml(st.h)+'</span></td>';
            } else {
              h += '<td><span style="color:var(--text3);font-size:12px">\u2014</span></td>';
            }
          }
          h += '<td><span class="grade-tag '+gc(st.g)+'">'+escHtml(displayGrade(st.g))+'</span></td>';
          if(showTime){
            var period = getStudentPeriod(si);
            h += '<td><span class="time-tag">'+escHtml(period)+'</span></td>';
          }
          h += '</tr>';
        });
        h += '</tbody></table></div></div>';
      });
      h += '</div>';
    }
    el.innerHTML = h;

    if(IS_ADMIN){
      el.querySelectorAll('.hr-input').forEach(function(inp){
        inp.addEventListener('change', function(){
          var si = +this.getAttribute('data-si');
          saveHr(si, this.value);
          this.className = 'hr-input' + (this.value ? ' filled' : '');
          toast('\u5df2\u5132\u5b58 ' + S[si].n + ' \u7684\u4eba\u4e8b\u865f');
        });
      });
    }
  }

  function renderTable(el){
    var ds = deptF ? [deptF] : AD;
    var h = '<div class="table-wrap"><table><thead><tr><th>\u9031\u6b21</th>';
    ds.forEach(function(d){ h += '<th style="text-align:center">'+escHtml(d)+'</th>'; });
    h += '<th style="text-align:center;background:#e8f0fe;color:#1d4ed8">\u5408\u8a08</th></tr></thead><tbody>';

    var dTotals = {}; ds.forEach(function(d){ dTotals[d]=0; }); var gTotal = 0;

    W.forEach(function(w){
      var depts = w[1];
      var rTotal = 0;
      var rh = '<tr><td style="font-weight:600;white-space:nowrap">'+escHtml(w[0])+'</td>';
      ds.forEach(function(d){
        var ids = (depts[d]||[]).filter(matchSearch);
        var c = ids.length;
        rTotal += c; dTotals[d] += c;
        if(c > 0){
          var names = ids.map(function(i){ return S[i].n+'('+S[i].s+') ['+S[i].c+']'; }).join('\n');
          rh += '<td class="count-cell has-tip">'+c+'<div class="tip">'+escHtml(names).replace(/\n/g,'<br>')+'</div></td>';
        } else {
          rh += '<td class="count-cell count-zero">-</td>';
        }
      });
      gTotal += rTotal;
      rh += '<td class="count-cell" style="background:#f0f5ff;font-weight:800">'+rTotal+'</td></tr>';
      h += rh;
    });

    h += '<tr class="total-row"><td>\u5408\u8a08</td>';
    ds.forEach(function(d){ h += '<td class="count-cell">'+dTotals[d]+'</td>'; });
    h += '<td class="count-cell" style="color:#1d4ed8;font-size:15px">'+gTotal+'</td></tr>';
    h += '</tbody></table></div>';
    h += '<p style="font-size:12px;color:var(--text3);margin-top:6px;">&#128161; \u6ed1\u9f20\u79fb\u5230\u6578\u5b57\u4e0a\u53ef\u67e5\u770b\u5b78\u54e1\u59d3\u540d\u3001\u5b78\u6821\u8207\u7c21\u78bc</p>';
    el.innerHTML = h;
  }

  function exportHrData(){
    var csv = '\uFEFF\u59d3\u540d,\u5b78\u6821,\u8eab\u4efd,\u7c21\u78bc,\u4eba\u4e8b\u865f\n';
    S.forEach(function(st){
      csv += st.n+','+st.s+','+st.g+','+st.c+','+st.h+'\n';
    });
    var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '\u5b78\u54e1\u4eba\u4e8b\u865f.csv';
    a.click();
    toast('\u5df2\u532f\u51fa\u5b78\u54e1\u4eba\u4e8b\u865f CSV');
  }

  function importHrPrompt(){
    var input = document.createElement('input');
    input.type = 'file'; input.accept = '.csv';
    input.onchange = function(e){
      var file = e.target.files[0]; if(!file) return;
      var reader = new FileReader();
      reader.onload = function(ev){
        var lines = ev.target.result.split('\n');
        var count = 0;
        lines.forEach(function(line){
          var parts = line.split(',');
          if(parts.length < 5) return;
          var name = parts[0].trim();
          var code = parts[3].trim();
          var hrId = parts[4].trim();
          if(!hrId || name==='\u59d3\u540d') return;
          var si = S.findIndex(function(s){ return s.n===name || s.c===code; });
          if(si>=0){ saveHr(si, hrId); count++; }
        });
        render();
        toast('\u5df2\u532f\u5165 '+count+' \u7b46\u4eba\u4e8b\u865f');
      };
      reader.readAsText(file, 'utf-8');
    };
    input.click();
  }

  render();

  // 查閱模式：自動從 Google Sheets 讀取最新人事號
  if(!IS_ADMIN && APPS_SCRIPT_URL){
    jsonpCall('fetch', function(json){
      if(json.status === 'ok' && json.data && json.data.length > 0){
        var count = 0;
        json.data.forEach(function(item){
          var si = S.findIndex(function(s){ return s.r === item.row && s.c === item.code; });
          if(si >= 0 && item.hrId){
            S[si].h = item.hrId;
            count++;
          }
        });
        if(count > 0) render();
      }
    }, function(){});
  }
})();
</script>
</body>
</html>
