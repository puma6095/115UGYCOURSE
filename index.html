<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>115學年度 學員報到總覽</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&display=swap');
:root{--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--text2:#555770;--text3:#8b8da3;--accent:#2563eb;--accent-light:#dbeafe;--accent-dark:#1d4ed8;--border:#e2e5ea;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);--shadow-lg:0 4px 16px rgba(0,0,0,.08),0 12px 40px rgba(0,0,0,.06);--radius:14px;--radius-sm:8px;--green:#059669;--green-bg:#ecfdf5}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 60%,#3b82f6 100%);padding:26px 32px 22px;color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(37,99,235,.25);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-left h1{font-size:21px;font-weight:700;letter-spacing:.5px}
.header-left .sub{font-size:13px;opacity:.75;font-weight:300;margin-top:2px}
.header-actions{display:flex;gap:8px}
.header-actions button{padding:7px 16px;border:1.5px solid rgba(255,255,255,.5);border-radius:var(--radius-sm);background:rgba(255,255,255,.12);color:#fff;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.header-actions button:hover{background:rgba(255,255,255,.25);border-color:#fff}
.controls{display:flex;gap:10px;align-items:center;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:78px;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.filter-group{display:flex;align-items:center;gap:6px}
.controls label{font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap}
.controls select,.controls input[type=text]{padding:7px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border-color .2s}
.controls select:focus,.controls input:focus{border-color:var(--accent)}
.controls select{cursor:pointer;min-width:200px}
.controls input[type=text]{min-width:150px}
.view-toggle{display:flex;background:#e8ebf0;border-radius:var(--radius-sm);overflow:hidden;margin-left:auto}
.view-toggle button{padding:7px 16px;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s}
.view-toggle button.active{background:var(--accent);color:#fff}
.main{padding:20px 24px 40px;max-width:1440px;margin:0 auto}
.summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:22px}
.summary-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);text-align:center}
.summary-card .num{font-size:30px;font-weight:900;color:var(--accent);line-height:1.1}
.summary-card .label{font-size:11.5px;color:var(--text3);font-weight:500;margin-top:3px}
.week-title{font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.week-title .badge{background:var(--accent);color:#fff;font-size:13px;font-weight:600;padding:3px 12px;border-radius:20px}
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(580px,1fr));gap:14px;margin-bottom:32px}
.dept-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:transform .15s,box-shadow .15s}
.dept-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.dept-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;border-bottom:1px solid var(--border)}
.dept-name{font-size:16px;font-weight:700}
.dept-count{background:var(--accent-light);color:var(--accent-dark);font-size:13px;font-weight:700;padding:2px 10px;border-radius:12px}
.stu-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:auto}
.stu-table-wrap{overflow-x:auto}
.stu-table th{text-align:left;padding:7px 10px;font-weight:600;color:var(--text3);background:#f8f9fb;font-size:11.5px;border-bottom:1px solid var(--border)}
.stu-table td{padding:7px 10px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.stu-table tr:last-child td{border-bottom:none}
.stu-table tr:hover td{background:#f8faff}
.stu-name{font-weight:600;white-space:nowrap}
.stu-code{color:var(--accent-dark);font-weight:600;font-family:'Menlo','Consolas',monospace;font-size:12.5px}
.hr-input{width:88px;padding:4px 7px;border:1.5px dashed #cbd5e1;border-radius:6px;font-family:'Menlo','Consolas',monospace;font-size:12.5px;color:var(--text);background:#fafbfc;outline:none;transition:all .2s}
.hr-input:focus{border-color:var(--accent);border-style:solid;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.hr-input.filled{border-color:var(--green);border-style:solid;background:var(--green-bg);color:var(--green)}
.grade-tag{font-size:11px;color:#fff;font-weight:500;padding:1px 8px;border-radius:10px;white-space:nowrap;display:inline-block}
.grade-six{background:#6366f1}.grade-four{background:#f59e0b}.grade-three{background:#10b981}.grade-other{background:#94a3b8}
.time-tag{display:inline-block;font-size:11px;color:var(--accent-dark);background:var(--accent-light);padding:2px 8px;border-radius:6px;margin:1px 2px;white-space:nowrap;font-weight:500}
.time-cell{line-height:1.7}
.table-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow-x:auto;margin-bottom:32px}
.table-wrap table{width:100%;border-collapse:collapse;font-size:13px}
.table-wrap th{background:#f8f9fb;padding:9px 12px;text-align:left;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:2}
.table-wrap td{padding:8px 12px;border-bottom:1px solid #f3f4f6;white-space:nowrap}
.table-wrap tr:hover td{background:#f8faff}
.count-cell{font-weight:700;color:var(--accent);text-align:center;cursor:default}
.count-zero{color:#d1d5db;font-weight:400}
.total-row td{font-weight:700!important;background:#f0f5ff!important;border-top:2px solid var(--accent)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.2);opacity:0;transform:translateY(12px);transition:all .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:28px 32px;max-width:560px;width:90%;box-shadow:var(--shadow-lg)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:6px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.modal input[type=text]{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Menlo','Consolas',monospace;outline:none;margin-bottom:16px;transition:border-color .2s}
.modal input[type=text]:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-actions button{padding:8px 20px;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:#e8ebf0;color:var(--text2)}
.btn-secondary:hover{background:#dde0e6}
.btn-settings{padding:7px 12px!important;border:1.5px solid rgba(255,255,255,.5)!important;border-radius:var(--radius-sm)!important;background:rgba(255,255,255,.08)!important;color:#fff!important;font-size:16px!important;cursor:pointer;transition:all .2s;line-height:1}
.has-tip{position:relative}
.has-tip .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:8px 12px;border-radius:8px;font-size:12px;white-space:pre-line;z-index:50;min-width:140px;box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:none;text-align:left;font-weight:400}
.has-tip:hover .tip{display:block}
@media(max-width:768px){.header{padding:18px 16px}.header-left h1{font-size:17px}.controls{padding:10px 14px;gap:6px;top:66px}.main{padding:14px 10px}.dept-grid{grid-template-columns:1fr}.summary-bar{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <h1>115 學年度 實習醫學生 COURSE 報到總覽</h1>
    <div class="sub" id="headerSub">各科部每週學員報到人數一覽</div>
  </div>
  <div class="header-actions" id="headerActions">
    <button id="btnSync" style="background:rgba(52,211,153,.25);border-color:rgba(52,211,153,.7)">&#9729; 同步到 Google Sheets</button>
    <button id="btnFetchSheet">&#128229; 從 Sheets 讀取</button>
    <button id="btnExport">&#128190; 匯出 CSV</button>
    <button id="btnImport">&#128194; 匯入 CSV</button>
    <button class="btn-settings" id="btnSettings" title="設定 Apps Script 網址">&#9881;</button>
  </div>
</div>
<div class="controls">
  <div class="filter-group"><label id="weekLabel">選擇週次</label><select id="weekSelect"></select></div>
  <div class="filter-group" id="deptFilterGroup"><label>篩選科部</label><select id="deptFilter"><option value="">全部科部</option></select></div>
  <div class="filter-group"><label>搜尋</label><input type="text" id="searchInput" placeholder="姓名、學校或簡碼…"></div>
  <div class="filter-group" id="filterUnfilledGroup" style="display:none">
    <label>填寫狀態</label>
    <select id="selStatus">
      <option value="unfilled">待填寫</option>
      <option value="filled">已填寫</option>
      <option value="all">全部</option>
    </select>
  </div>
  <div class="view-toggle">
    <button id="btnCard" class="active">卡片檢視</button>
    <button id="btnTable">總表檢視</button>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>&#9881; Google Apps Script 設定</h3>
    <p>請貼上部署後取得的網頁應用程式網址：</p>
    <input type="text" id="inputUrl" placeholder="https://script.google.com/macros/s/.../exec">
    <div class="modal-actions">
      <button class="btn-secondary" id="btnModalCancel">取消</button>
      <button class="btn-primary" id="btnModalSave">儲存</button>
    </div>
  </div>
</div>
<div class="main" id="main">
  <div style="text-align:center;padding:80px 20px;color:#8b8da3">
    <div style="font-size:36px;margin-bottom:12px">&#9203;</div>
    <p style="font-size:15px" id="loadingMsg">正在從 Google Sheets 載入資料…</p>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
(function(){
var params=new URLSearchParams(window.location.search);
var IS_ADMIN=(params.get('mode')==='admin');

if(!IS_ADMIN){['btnSync','btnFetchSheet','btnImport','btnSettings'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display='none';});}
if(IS_ADMIN){['deptFilterGroup','btnTable'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display='none';});document.getElementById('filterUnfilledGroup').style.display='';document.getElementById('weekLabel').textContent='\u5be6\u7fd2\u671f\u9593';}

var subEl=document.getElementById('headerSub');
if(IS_ADMIN){subEl.innerHTML='<span style="background:#fbbf24;color:#78350f;padding:2px 10px;border-radius:8px;font-weight:600;font-size:12px;margin-right:6px">\u4eba\u8cc7\u90e8\u7ba1\u7406\u6a21\u5f0f</span>'+subEl.textContent;}
else{subEl.innerHTML='<span style="background:rgba(255,255,255,.2);padding:2px 10px;border-radius:8px;font-weight:500;font-size:12px;margin-right:6px">\u79d1\u90e8\u67e5\u95b1\u6a21\u5f0f</span>'+subEl.textContent;}

var URL_KEY='apps_script_url_115';
var DEFAULT_URL='https://script.google.com/macros/s/AKfycby-uO82SW6GIKM0FUwik-v93_7D_ZUDqD2X8Q9_yPMRQkZ7Eqwd5x5lBnt52jZuFoSH/exec';
var APPS_SCRIPT_URL=DEFAULT_URL;
try{var saved=localStorage.getItem(URL_KEY);if(saved)APPS_SCRIPT_URL=saved;}catch(e){}

document.getElementById('btnSettings').addEventListener('click',function(){document.getElementById('inputUrl').value=APPS_SCRIPT_URL;document.getElementById('modalOverlay').className='modal-overlay show';});
document.getElementById('btnModalCancel').addEventListener('click',function(){document.getElementById('modalOverlay').className='modal-overlay';});
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)this.className='modal-overlay';});
document.getElementById('btnModalSave').addEventListener('click',function(){var v=document.getElementById('inputUrl').value.trim();APPS_SCRIPT_URL=v;try{localStorage.setItem(URL_KEY,v);}catch(e){}document.getElementById('modalOverlay').className='modal-overlay';toast(v?'Apps Script \u7db2\u5740\u5df2\u5132\u5b58':'\u7db2\u5740\u5df2\u6e05\u9664');});

function jsonpCall(action,onOk,onErr){var cb='__cb'+Date.now()+Math.random().toString(36).slice(2,6);var tid;window[cb]=function(j){clearTimeout(tid);delete window[cb];var s=document.getElementById(cb);if(s)s.remove();if(onOk)onOk(j);};tid=setTimeout(function(){delete window[cb];var s=document.getElementById(cb);if(s)s.remove();if(onErr)onErr();},20000);var s=document.createElement('script');s.id=cb;s.src=APPS_SCRIPT_URL+'?action='+action+'&callback='+cb;s.onerror=function(){clearTimeout(tid);delete window[cb];this.remove();if(onErr)onErr();};document.body.appendChild(s);}

jsonpCall('fulldata',function(json){if(json.status!=='ok'||!json.students){document.getElementById('loadingMsg').textContent='\u8f09\u5165\u5931\u6557\uff1a'+(json.message||'\u672a\u77e5\u932f\u8aa4');return;}initApp(json);},function(){document.getElementById('loadingMsg').textContent='\u8f09\u5165\u903e\u6642\uff0c\u8acb\u78ba\u8a8d Apps Script \u5df2\u90e8\u7f72';});

var S,W,WL,AD,HR_KEY='hr_ids_115',hrStore={};
var view='card',wIdx=-1,deptF='',search='';
var statusFilter='unfilled',onlyUnfilled=IS_ADMIN;

function initApp(DATA){
  S=DATA.students;WL=DATA.weekLabels;AD=DATA.allDepts;
  W=[];WL.forEach(function(wl,wi){var dm={};S.forEach(function(st,si){st.sc.forEach(function(e){if(e[0]===wi){if(!dm[e[1]])dm[e[1]]=[];dm[e[1]].push(si);}});});W.push([wl,dm]);});
  subEl.innerHTML=subEl.innerHTML.replace(/\u5404\u79d1\u90e8.*$/,'\u5171 '+S.length+' \u4f4d\u5b78\u54e1 / '+WL.length+' \u9031 / '+AD.length+' \u500b\u79d1\u90e8');
  try{hrStore=JSON.parse(localStorage.getItem(HR_KEY)||'{}');}catch(e){}
  if(IS_ADMIN){Object.keys(hrStore).forEach(function(k){var i=+k;if(S[i]&&hrStore[k])S[i].h=hrStore[k];});}

  var weekSel=document.getElementById('weekSelect');
  var oAll=document.createElement('option');oAll.value=-1;oAll.textContent='\u2500\u2500 \u6240\u6709\u6642\u9593 \u2500\u2500';weekSel.appendChild(oAll);
  W.forEach(function(w,i){var t=0;Object.keys(w[1]).forEach(function(k){t+=w[1][k].length;});var o=document.createElement('option');o.value=i;o.textContent=w[0]+' ('+t+'\u4eba)';weekSel.appendChild(o);});
  var deptSel=document.getElementById('deptFilter');
  AD.forEach(function(d){var o=document.createElement('option');o.value=d;o.textContent=d;deptSel.appendChild(o);});

  weekSel.addEventListener('change',function(e){wIdx=parseInt(e.target.value,10);render();});
  deptSel.addEventListener('change',function(e){deptF=e.target.value;render();});
  document.getElementById('searchInput').addEventListener('input',function(e){search=e.target.value.trim().toLowerCase();render();});
  document.getElementById('btnCard').addEventListener('click',function(){setView('card');});
  document.getElementById('btnTable').addEventListener('click',function(){setView('table');});
  document.getElementById('btnExport').addEventListener('click',exportHrData);
  document.getElementById('btnImport').addEventListener('click',importHrPrompt);
  document.getElementById('btnSync').addEventListener('click',syncToSheet);
  document.getElementById('btnFetchSheet').addEventListener('click',fetchFromSheetBtn);
  document.getElementById('selStatus').addEventListener('change',function(){statusFilter=this.value;onlyUnfilled=(statusFilter==='unfilled');render();});
  render();
}

function setView(v){view=v;document.getElementById('btnCard').className=v==='card'?'active':'';document.getElementById('btnTable').className=v==='table'?'active':'';render();}
function gc(g){if(g.indexOf('\u516d')>=0)return'grade-six';if(g.indexOf('\u56db')>=0)return'grade-four';if(g.indexOf('\u4e09')>=0)return'grade-three';return'grade-other';}
function displayGrade(g){if(g==='\u4e09\u5e74\u7d1a')return'\u5f8c\u91ab\u4e09';if(g==='\u56db\u5e74\u7d1a')return'\u5f8c\u91ab\u56db';return g;}
function matchSearch(si){if(!search)return true;var st=S[si];return st.n.toLowerCase().indexOf(search)>=0||st.s.toLowerCase().indexOf(search)>=0||st.c.toLowerCase().indexOf(search)>=0||st.h.toLowerCase().indexOf(search)>=0;}
function saveHr(si,v){S[si].h=v;hrStore[si]=v;try{localStorage.setItem(HR_KEY,JSON.stringify(hrStore));}catch(e){}}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='toast show';setTimeout(function(){t.className='toast';},2200);}
function escHtml(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;}
function getStudentDeptWeekIdxs(si,dept){var r=[];S[si].sc.forEach(function(e){if(e[1]===dept)r.push(e[0]);});r.sort(function(a,b){return a-b;});return r;}
function getStudentAllWeekIdxs(si){var r=[];S[si].sc.forEach(function(e){r.push(e[0]);});r.sort(function(a,b){return a-b;});return r;}
function getStudentPeriod(si){var x=getStudentAllWeekIdxs(si);if(!x.length)return'';var f=WL[x[0]],l=WL[x[x.length-1]];if(f===l)return f;return f.split('-')[0]+'~'+l.split('-').pop();}
function getStudentDeptPeriod(si,dept){var x=getStudentDeptWeekIdxs(si,dept);if(!x.length)return'';var f=WL[x[0]],l=WL[x[x.length-1]];if(f===l)return f;return f.split('-')[0]+'~'+l.split('-').pop();}
function getAllWeeksMerged(){var m={};W.forEach(function(w){Object.keys(w[1]).forEach(function(dk){if(!m[dk])m[dk]={};w[1][dk].forEach(function(si){m[dk][si]=true;});});});var r={};Object.keys(m).forEach(function(dk){r[dk]=Object.keys(m[dk]).map(Number);});return r;}
function render(){var el=document.getElementById('main');if(!S)return;if(view==='card'){if(IS_ADMIN)renderAdmin(el);else renderViewer(el);}else{renderTable(el);}}

function renderAdmin(el){
  var students=[],seen={};
  if(wIdx===-1){S.forEach(function(st,si){students.push(si);});}
  else{var w=W[wIdx],d=w[1];Object.keys(d).forEach(function(dk){d[dk].forEach(function(si){if(!seen[si]){seen[si]=true;students.push(si);}});});}
  students=students.filter(matchSearch);
  if(statusFilter==='unfilled')students=students.filter(function(si){return!S[si].h||!S[si].h.trim();});
  else if(statusFilter==='filled')students=students.filter(function(si){return S[si].h&&S[si].h.trim();});
  students.sort(function(a,b){var ai=getStudentAllWeekIdxs(a),bi=getStudentAllWeekIdxs(b);return(ai.length?ai[0]:9999)-(bi.length?bi[0]:9999);});
  var total=students.length,filledC=students.filter(function(si){return S[si].h&&S[si].h.trim();}).length;
  var schMap={};students.forEach(function(si){schMap[S[si].s]=(schMap[S[si].s]||0)+1;});
  var topSch=Object.entries(schMap).sort(function(a,b){return b[1]-a[1];})[0];
  var h='<div class="summary-bar"><div class="summary-card"><div class="num">'+total+'</div><div class="label">'+(onlyUnfilled?'\u5f85\u586b\u5beb\u4eba\u6578':'\u7b26\u5408\u689d\u4ef6\u5b78\u54e1')+'</div></div>';
  if(!onlyUnfilled){h+='<div class="summary-card"><div class="num" style="color:var(--green)">'+filledC+'</div><div class="label">\u5df2\u586b\u5beb</div></div><div class="summary-card"><div class="num" style="color:#ef4444">'+(total-filledC)+'</div><div class="label">\u5f85\u586b\u5beb</div></div>';}
  h+='<div class="summary-card"><div class="num" style="font-size:19px">'+(topSch?escHtml(topSch[0]):'-')+'</div><div class="label">\u6700\u591a\u5b78\u6821 ('+(topSch?topSch[1]:0)+'\u4eba)</div></div></div>';
  h+='<div class="week-title">'+escHtml(wIdx===-1?'\u6240\u6709\u5b78\u54e1':W[wIdx][0])+' <span class="badge">'+total+' \u4f4d\u5b78\u54e1</span></div>';
  if(!students.length){h+='<div class="empty-state"><div class="icon">'+(onlyUnfilled?'&#9989;':'&#128203;')+'</div><p>'+(onlyUnfilled?'\u6240\u6709\u5b78\u54e1\u4eba\u4e8b\u865f\u5df2\u586b\u5beb\u5b8c\u6210\uff01':'\u7121\u7b26\u5408\u689d\u4ef6\u5b78\u54e1')+'</p></div>';}
  else{
    h+='<div class="dept-grid" style="grid-template-columns:1fr"><div class="dept-card"><div class="stu-table-wrap"><table class="stu-table"><thead><tr><th>\u59d3\u540d</th><th>\u5b78\u6821</th><th>\u7c21\u78bc</th><th>\u4eba\u4e8b\u865f</th><th>\u5e74\u7d1a</th><th>\u5be6\u7fd2\u671f\u9593</th></tr></thead><tbody>';
    students.forEach(function(si){var st=S[si],fc=st.h?' filled':'',p=getStudentPeriod(si);h+='<tr><td class="stu-name">'+escHtml(st.n)+'</td><td>'+escHtml(st.s)+'</td><td class="stu-code">'+escHtml(st.c)+'</td><td><input class="hr-input'+fc+'" type="text" value="'+escHtml(st.h)+'" placeholder="\u5f85\u586b\u5beb" data-si="'+si+'"></td><td><span class="grade-tag '+gc(st.g)+'">'+escHtml(displayGrade(st.g))+'</span></td><td><span class="time-tag">'+escHtml(p)+'</span></td></tr>';});
    h+='</tbody></table></div></div></div>';
  }
  el.innerHTML=h;
  el.querySelectorAll('.hr-input').forEach(function(inp){inp.addEventListener('change',function(){var si=+this.getAttribute('data-si');saveHr(si,this.value);this.className='hr-input'+(this.value?' filled':'');toast('\u5df2\u5132\u5b58 '+S[si].n+' \u7684\u4eba\u4e8b\u865f');});});
}

function renderViewer(el){
  var isAll=(wIdx===-1),depts=isAll?getAllWeeksMerged():W[wIdx][1],dks=Object.keys(depts).sort();
  if(deptF)dks=dks.filter(function(d){return d===deptF;});
  var filtered={},total=0;
  dks.forEach(function(dk){var ids=depts[dk].filter(matchSearch);if(!isAll){ids=ids.filter(function(si){var di=getStudentDeptWeekIdxs(si,dk);return di.length>0&&di[0]===wIdx;});}if(ids.length){filtered[dk]=ids;total+=ids.length;}});
  var fks=Object.keys(filtered).sort(),maxD='-',maxC=0;
  fks.forEach(function(k){if(filtered[k].length>maxC){maxC=filtered[k].length;maxD=k;}});
  var schMap={};fks.forEach(function(k){filtered[k].forEach(function(i){schMap[S[i].s]=(schMap[S[i].s]||0)+1;});});
  var topSch=Object.entries(schMap).sort(function(a,b){return b[1]-a[1];})[0];
  var h='<div class="summary-bar"><div class="summary-card"><div class="num">'+total+'</div><div class="label">'+(isAll?'\u5168\u5b78\u5e74\u5831\u5230\u4eba\u6b21':'\u672c\u9031\u65b0\u5831\u5230\u4eba\u6578')+'</div></div>';
  h+='<div class="summary-card"><div class="num">'+fks.length+'</div><div class="label">\u6d89\u53ca\u79d1\u90e8\u6578</div></div>';
  h+='<div class="summary-card"><div class="num" style="font-size:22px">'+escHtml(maxD)+'</div><div class="label">\u6700\u591a\u4eba\u79d1\u90e8 ('+maxC+'\u4eba)</div></div>';
  h+='<div class="summary-card"><div class="num" style="font-size:19px">'+(topSch?escHtml(topSch[0]):'-')+'</div><div class="label">\u6700\u591a\u5b78\u6821 ('+(topSch?topSch[1]:0)+'\u4eba)</div></div></div>';
  h+='<div class="week-title">'+escHtml(isAll?'\u6240\u6709\u6642\u9593\uff08\u5168\u5b78\u5e74\uff09':W[wIdx][0])+' <span class="badge">'+total+' \u4f4d\u5b78\u54e1</span></div>';
  if(!fks.length){h+='<div class="empty-state"><div class="icon">&#128203;</div><p>\u7121\u7b26\u5408\u689d\u4ef6\u7684\u5b78\u54e1</p></div>';}
  else{
    h+='<div class="dept-grid" style="'+(deptF?'grid-template-columns:1fr':'')+'">';
    fks.forEach(function(dk){
      var ids=filtered[dk].slice().sort(function(a,b){var ai=getStudentDeptWeekIdxs(a,dk),bi=getStudentDeptWeekIdxs(b,dk);return(ai.length?ai[0]:9999)-(bi.length?bi[0]:9999);});
      h+='<div class="dept-card"><div class="dept-card-header"><span class="dept-name">'+escHtml(dk)+'</span><span class="dept-count">'+ids.length+' \u4eba</span></div>';
      h+='<div class="stu-table-wrap"><table class="stu-table"><thead><tr><th>\u59d3\u540d</th><th>\u5b78\u6821</th><th>\u7c21\u78bc</th><th>\u4eba\u4e8b\u865f</th><th>\u5e74\u7d1a</th><th>\u5be6\u7fd2\u671f\u9593</th></tr></thead><tbody>';
      ids.forEach(function(si){var st=S[si],p=getStudentDeptPeriod(si,dk);
        h+='<tr><td class="stu-name">'+escHtml(st.n)+'</td><td>'+escHtml(st.s)+'</td><td class="stu-code">'+escHtml(st.c)+'</td>';
        h+=(st.h?'<td><span class="stu-code" style="color:var(--green)">'+escHtml(st.h)+'</span></td>':'<td><span style="color:var(--text3);font-size:12px">\u2014</span></td>');
        h+='<td><span class="grade-tag '+gc(st.g)+'">'+escHtml(displayGrade(st.g))+'</span></td><td><span class="time-tag">'+escHtml(p)+'</span></td></tr>';});
      h+='</tbody></table></div></div>';});
    h+='</div>';
  }
  el.innerHTML=h;
}

function renderTable(el){
  var ds=deptF?[deptF]:AD;
  var h='<div class="table-wrap"><table><thead><tr><th>\u9031\u6b21</th>';
  ds.forEach(function(d){h+='<th style="text-align:center">'+escHtml(d)+'</th>';});
  h+='<th style="text-align:center;background:#e8f0fe;color:#1d4ed8">\u5408\u8a08</th></tr></thead><tbody>';
  var dT={};ds.forEach(function(d){dT[d]=0;});var gT=0;
  W.forEach(function(w){var d=w[1],rT=0;var rh='<tr><td style="font-weight:600;white-space:nowrap">'+escHtml(w[0])+'</td>';
    ds.forEach(function(dd){var ids=(d[dd]||[]).filter(matchSearch);var c=ids.length;rT+=c;dT[dd]+=c;
      if(c>0){var nm=ids.map(function(i){return S[i].n+'('+S[i].s+') ['+S[i].c+']';}).join('\n');rh+='<td class="count-cell has-tip">'+c+'<div class="tip">'+escHtml(nm).replace(/\n/g,'<br>')+'</div></td>';}
      else{rh+='<td class="count-cell count-zero">-</td>';}});
    gT+=rT;rh+='<td class="count-cell" style="background:#f0f5ff;font-weight:800">'+rT+'</td></tr>';h+=rh;});
  h+='<tr class="total-row"><td>\u5408\u8a08</td>';ds.forEach(function(d){h+='<td class="count-cell">'+dT[d]+'</td>';});
  h+='<td class="count-cell" style="color:#1d4ed8;font-size:15px">'+gT+'</td></tr></tbody></table></div>';
  el.innerHTML=h;
}

function syncToSheet(){
  if(!APPS_SCRIPT_URL){document.getElementById('modalOverlay').className='modal-overlay show';return;}
  var payload=[];S.forEach(function(st){payload.push({name:st.n,code:st.c,hrId:st.h||'',row:st.r});});
  var fc=payload.filter(function(p){return p.hrId.trim();}).length;
  var btn=document.getElementById('btnSync'),orig=btn.innerHTML;
  btn.textContent='\u2026 \u540c\u6b65\u4e2d ('+fc+' \u7b46)';btn.disabled=true;
  var ifr=document.createElement('iframe');ifr.name='sf'+Date.now();ifr.style.display='none';document.body.appendChild(ifr);
  var form=document.createElement('form');form.method='POST';form.action=APPS_SCRIPT_URL;form.target=ifr.name;form.style.display='none';
  var ta=document.createElement('textarea');ta.name='postData';ta.value=JSON.stringify({action:'sync',data:payload});form.appendChild(ta);
  document.body.appendChild(form);form.submit();
  setTimeout(function(){form.remove();ifr.remove();toast('\u540c\u6b65\u5df2\u9001\u51fa\uff0c\u8acb\u7a0d\u5019\u78ba\u8a8d Sheets');btn.innerHTML=orig;btn.disabled=false;},4000);
}

function fetchFromSheetBtn(){
  if(!APPS_SCRIPT_URL){document.getElementById('modalOverlay').className='modal-overlay show';return;}
  var btn=document.getElementById('btnFetchSheet'),orig=btn.innerHTML;
  btn.textContent='\u2026 \u8b80\u53d6\u4e2d';btn.disabled=true;
  jsonpCall('fetch',function(j){
    if(j.status==='ok'&&j.data&&j.data.length>0){var c=0;j.data.forEach(function(it){var si=S.findIndex(function(s){return s.r===it.row;});if(si>=0&&it.hrId){S[si].h=it.hrId;hrStore[si]=it.hrId;c++;}});try{localStorage.setItem(HR_KEY,JSON.stringify(hrStore));}catch(e){}render();toast('\u5df2\u8b80\u53d6 '+c+' \u7b46');}
    else{toast('Sheets \u4e0a\u7121\u8cc7\u6599');}btn.innerHTML=orig;btn.disabled=false;
  },function(){toast('\u8b80\u53d6\u903e\u6642');btn.innerHTML=orig;btn.disabled=false;});
}

function exportHrData(){
  var header='\uFEFF\u59d3\u540d,\u5b78\u6821,\u8eab\u4efd,\u7c21\u78bc,\u4eba\u4e8b\u865f';
  WL.forEach(function(wl){header+=','+wl;});
  var csv=header+'\n';
  S.forEach(function(st,si){
    var weekDepts={};
    st.sc.forEach(function(e){weekDepts[e[0]]=e[1];});
    csv+=st.n+','+st.s+','+st.g+','+st.c+','+st.h;
    WL.forEach(function(wl,wi){csv+=','+(weekDepts[wi]||'');});
    csv+='\n';
  });
  var b=new Blob([csv],{type:'text/csv;charset=utf-8'});var a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download='\u5b78\u54e1\u5831\u5230\u7e3d\u89bd.csv';a.click();toast('\u5df2\u532f\u51fa CSV');
}

function importHrPrompt(){var inp=document.createElement('input');inp.type='file';inp.accept='.csv';inp.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var lines=ev.target.result.split('\n');var c=0;lines.forEach(function(line){var p=line.split(',');if(p.length<5)return;var nm=p[0].trim(),cd=p[3].trim(),hr=p[4].trim();if(!hr||nm==='\u59d3\u540d')return;var si=S.findIndex(function(s){return s.n===nm||s.c===cd;});if(si>=0){saveHr(si,hr);c++;}});render();toast('\u5df2\u532f\u5165 '+c+' \u7b46');};r.readAsText(f,'utf-8');};inp.click();}

})();
</script>
